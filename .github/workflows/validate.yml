name: Validate

# index.html は単一ファイル構成のため、構文エラーが1つでも入るとアプリ全体が
# 起動しなくなる。プッシュ／プルリクエストのたびに最低限の妥当性を自動チェックする。
on:
  push:
    branches: ['**']
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run lightweight validation
        run: node .github/scripts/validate.mjs
