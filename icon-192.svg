<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="gloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.07)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="192" height="192" rx="40" fill="url(#bg)"/>
  <!-- Gloss overlay -->
  <rect width="192" height="96" rx="40" fill="url(#gloss)"/>
  <!-- Subtle border -->
  <rect x="1" y="1" width="190" height="190" rx="39" fill="none" stroke="rgba(255,255,255,0.10)" stroke-width="1.5"/>
  <!-- CE text -->
  <text x="96" y="108" text-anchor="middle"
    font-family="'Helvetica Neue', 'Arial', sans-serif"
    font-weight="800" font-size="76" fill="#ffffff"
    letter-spacing="-4">CE</text>
  <!-- Divider line -->
  <rect x="52" y="120" width="88" height="1.5" rx="1" fill="rgba(255,255,255,0.18)"/>
  <!-- Subtitle -->
  <text x="96" y="144" text-anchor="middle"
    font-family="'Helvetica Neue', 'Arial', sans-serif"
    font-weight="300" font-size="15" fill="rgba(255,255,255,0.45)"
    letter-spacing="8">分院</text>
</svg>
