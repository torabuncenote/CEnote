<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="gloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.07)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Gloss overlay -->
  <rect width="512" height="256" rx="108" fill="url(#gloss)"/>
  <!-- Subtle border -->
  <rect x="2" y="2" width="508" height="508" rx="106" fill="none" stroke="rgba(255,255,255,0.10)" stroke-width="2"/>
  <!-- CE text -->
  <text x="256" y="294" text-anchor="middle"
    font-family="'Helvetica Neue', 'Arial', sans-serif"
    font-weight="800" font-size="200" fill="#ffffff"
    letter-spacing="-10">CE</text>
  <!-- Divider line -->
  <rect x="140" y="322" width="232" height="3" rx="2" fill="rgba(255,255,255,0.18)"/>
  <!-- Subtitle -->
  <text x="256" y="376" text-anchor="middle"
    font-family="'Helvetica Neue', 'Arial', sans-serif"
    font-weight="300" font-size="40" fill="rgba(255,255,255,0.45)"
    letter-spacing="22">分院</text>
</svg>
